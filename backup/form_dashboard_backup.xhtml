<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                xmlns:f="http://xmlns.jcp.org/jsf/core"
                xmlns:p="http://primefaces.org/ui">

  <f:metadata>
    <f:event listener="#{dashboardController.initData()}" type="preRenderView"/>
  </f:metadata>

  <div class="layar-dashboard">
    <ui:fragment rendered="#{empty dashboardController.listModelVerifikasiPie}">
      <div class="baris-bebas-dashboard">
        <h1>SELAMAT DATANG!</h1>
      </div>
    </ui:fragment>
    <ui:fragment rendered="#{not empty dashboardController.listModelVerifikasiPie}">
      <div class="baris-header">
        <h:outputText value="Seluruh Insiden Keselamatan Pasien"/>
      </div>
      <div class="baris-rata-dashboard">
        <ui:repeat value="#{dashboardController.listModelJenisInsiden}"
                   var="lModelJenis">
          <div class="panel-dashboard">
            <div class="panel-dashboard-logo">
              <h:outputText value="#{lModelJenis.total}"/>
            </div>
            <div class="panel-dashboard-body">
              <h:outputText value="#{lModelJenis.jenisInsiden}"/>
            </div>
          </div>
        </ui:repeat>
      </div>
      <div class="baris-header">
        <h:outputText value="Verifikasi Insiden Keselamatan Pasien"/>
      </div>
      <div class="baris-rata-dashboard">
        <ui:repeat value="#{dashboardController.listModelVerifikasiPie}"
                   var="lModelVerifikasiIKP">
          <div class="panel-dashboard">
            <div class="panel-dahsboard-logo">
              <p:pieChart model="#{lModelVerifikasiIKP.pieModel}"/>
            </div>
            <div class="panel-dashboard-body">
              <h:outputText value="#{lModelVerifikasiIKP.jenisInsiden}"/>
            </div>
          </div>
        </ui:repeat>
      </div>
    </ui:fragment>
  </div>

</ui:composition>
