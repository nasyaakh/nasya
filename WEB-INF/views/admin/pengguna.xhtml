<ui:composition
  template="/WEB-INF/assets/template/form_template.xhtml"
  xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
  xmlns:h="http://xmlns.jcp.org/jsf/html"
  xmlns:f="http://xmlns.jcp.org/jsf/core">

  <ui:define name="content">

    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
    <h:outputStylesheet library="css" name="Style.css"/>

    <div id="pengguna" class="page active">
    <div class="admin-layout">
      <aside class="sidebar" id="sb-pengguna"></aside>
      <div class="main-area">
        <div class="topbar">
          <div class="topbar-title">Master Data <span>/ Manajemen Pengguna</span></div>
          <div class="topbar-right">
            <div class="theme-toggle-wrap"><button class="theme-toggle" onclick="toggleTheme()"></button></div>
            <div class="topbar-avatar">A</div>
          </div>
        </div>
        <div class="content">
          <div class="pg-header-bar">
            <div>
              <div style="font-size:16px;font-weight:800">Manajemen Pengguna</div>
              <div style="font-size:13px;color:var(--muted);margin-top:2px">Kelola akun, role, dan akses pengguna sistem
                SIDEKAP</div>
            </div>
            <button class="btn-add-user" onclick="openUserModal()"><span style="font-size:16px">＋</span> Tambah
              Pengguna</button>
          </div>
          <div class="user-stats" id="user-stats-row"></div>
          <div class="role-tabs" id="role-tabs">
            <div class="role-tab active" data-role="semua" onclick="filterRole('semua')">Semua <span class="rt-count"
                id="cnt-semua">0</span></div>
            <div class="role-tab" data-role="Super Admin" onclick="filterRole('Super Admin')">👑 Super Admin <span
                class="rt-count" id="cnt-superadmin">0</span></div>
            <div class="role-tab" data-role="Admin" onclick="filterRole('Admin')">🛡️ Admin <span class="rt-count"
                id="cnt-admin">0</span></div>
            <div class="role-tab" data-role="Kepala Ruangan" onclick="filterRole('Kepala Ruangan')">🏥 Ka. Ruangan <span
                class="rt-count" id="cnt-karu">0</span></div>
            <div class="role-tab" data-role="Pelapor" onclick="filterRole('Pelapor')">📋 Pelapor <span class="rt-count"
                id="cnt-pelapor">0</span></div>
          </div>
          <div class="table-card" id="user-table-card">
            <div class="table-head">
              <h3 id="user-table-title">Semua Pengguna</h3>
              <div class="tbl-controls">
                <div class="search-wrap"><span class="search-ico">🔍</span><input type="text" id="user-search"
                    placeholder="Cari nama, username..." oninput="renderUserTable()"></div>
                <select class="flt" id="user-unit-filter" onchange="renderUserTable()">
                  <option value="">Semua Unit</option>
                  <option>CASE MANAGER</option>
                  <option>FISIOTERAPI</option>
                  <option>HHPO</option>
                  <option>IGD</option>
                  <option>IKFM</option>
                  <option>INSTALASI BEDAH SENTRAL</option>
                  <option>INSTALASI FARMASI</option>
                  <option>INSTALASI GIZI</option>
                  <option>INSTALASI PKRS</option>
                  <option>INSTALASI RADIOLOGI</option>
                  <option>INSTALASI RADIONUKLIR</option>
                  <option>INSTALASI RADIOTERAPI</option>
                  <option>INSTALASI RAWAT INAP</option>
                  <option>INSTALASI RAWAT JALAN</option>
                  <option>IPFRS</option>
                  <option>IPPP</option>
                  <option>IRM</option>
                  <option>ISB</option>
                  <option>ISL</option>
                  <option>ISOLASI</option>
                  <option>K3</option>
                  <option>LABORATORIUM MIKRO</option>
                  <option>LABORATORIUM PA</option>
                  <option>LABORATORIUM PK</option>
                  <option>LAIN-LAIN</option>
                  <option>LOGISTIK</option>
                  <option>ODC (KEMOTERAPI)</option>
                  <option>OK IBS</option>
                  <option>OK IGD</option>
                  <option>PPI</option>
                  <option>PPT</option>
                  <option>PUSDIKLAT</option>
                  <option>RUAI</option>
                  <option>RUANGAN ANAK</option>
                  <option>RUANGAN CAMAR</option>
                  <option>RUANGAN CATHLAB</option>
                  <option>RUANGAN CENDANA</option>
                  <option>RUANGAN ENGGANG GADING</option>
                  <option>RUANGAN HCU</option>
                  <option>RUANGAN HEMODIALISA</option>
                  <option>RUANGAN ICU</option>
                  <option>RUANGAN ICVCU</option>
                  <option>RUANGAN KERAPU</option>
                  <option>RUANGAN MAHONI</option>
                  <option>RUANGAN MERANTI</option>
                  <option>RUANGAN NICU</option>
                  <option>RUANGAN PERINATOLOGI</option>
                  <option>RUANGAN PICU</option>
                  <option>RUANGAN RAMIN</option>
                  <option>RUANGAN RAWAT INAP PJT</option>
                  <option>RUANGAN SINGKUT BULUH</option>
                  <option>THALASEMIA</option>
                  <option>UNIT PELAYANAN STROKE</option>
                  <option>UTDRS</option>
                </select>
                <select class="flt" id="user-status-filter" onchange="renderUserTable()">
                  <option value="">Semua Status</option>
                  <option>Aktif</option>
                  <option>Nonaktif</option>
                </select>
              </div>
            </div>
            <table class="desktop-table">
              <thead>
                <tr>
                  <th>Pengguna</th>
                  <th>Role</th>
                  <th class="th-hide-mobile">Unit</th>
                  <th class="th-hide-mobile">Status</th>
                  <th class="th-hide-mobile">Login Terakhir</th>
                  <th class="th-hide-mobile" style="text-align:center">Aksi</th>
                  <th class="th-expand" style="width:40px"></th>
                </tr>
              </thead>
              <tbody id="user-tbody"></tbody>
            </table>
            <div class="pgn">
              <div class="pgn-info" id="user-pgn-info"></div>
              <div class="pgn-btns" id="user-pgn-btns"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="g-topbar"><div class="mt-logo"><div class="mt-logo-icon"><i class="ph ph-hospital"></i></div><div>
        <div class="mt-name">SIDEKAP</div>
        <div class="mt-sub" id="g-page-title"></div>
      </div></div><div style="display:flex;align-items:center;gap:8px"><div class="mt-av">A</div><button class="hamburger-btn" id="g-hamburger" onclick="toggleMobileDrawer()"><span class="hb-bar"></span><span class="hb-bar"></span><span class="hb-bar"></span></button></div></div>
    <div id="mobile-overlay" onclick="toggleMobileDrawer()"></div>
    <div id="mobile-drawer"><div class="mdr-head"><div class="sb-icon"><i class="ph ph-hospital"></i></div><div>
        <div class="mdr-title">SIDEKAP</div>
        <div class="mdr-subtitle">Admin Panel</div>
      </div></div><div class="mdr-nav" id="mdr-nav-content"></div><div class="mdr-foot"><div class="sb-user"><div class="sb-avatar">A</div><div style="flex:1;min-width:0">
          <div class="sb-uname">Administrator</div>
          <div class="sb-urole">Super Admin</div>
        </div><button onclick="doLogout()" title="Keluar" style="width:28px;height:28px;border-radius:7px;background:var(--border2);border:none;cursor:pointer;font-size:14px;flex-shrink:0;color:var(--text);display:flex;align-items:center;justify-content:center;transition:all .2s" onmouseover="this.style.background='var(--danger)';this.style.color='#fff'" onmouseout="this.style.background=\'var(--border2)\';this.style.color=\'var(--text)\'"><i
            class="ph ph-sign-out"></i></button></div></div></div>
    <div id="toast" class="toast"></div>
    <h:outputScript library="js" name="Script.js"/>
    <script>//<![CDATA[
      function filterTable(i,t){const q=document.getElementById(i).value.toLowerCase();document.querySelectorAll('#'+t+' tr').forEach(r=>r.style.display=r.innerText.toLowerCase().includes(q)?'':'none');}
      function openModal(){document.getElementById('pg-modal').style.display='flex';}
      function closeModal(){document.getElementById('pg-modal').style.display='none';}
      function editRow(btn){document.getElementById('pg-modal-title').innerHTML='<i class="ph ph-pencil-simple" style="margin-right:6px"></i> Edit Pengguna';openModal();}
      function hapusRow(btn){if(confirm('Yakin ingin menghapus pengguna ini?')){btn.closest('tr').remove();if(typeof showToast==='function')showToast('Pengguna berhasil dihapus');}}
    //]]></script>

  </ui:define>

</ui:composition>
