<ui:composition
  template="/WEB-INF/assets/template/form_template.xhtml"
  xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
  xmlns:h="http://xmlns.jcp.org/jsf/html"
  xmlns:f="http://xmlns.jcp.org/jsf/core">

  <ui:define name="content">

    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
    <h:outputStylesheet library="css" name="Style.css"/>

    <!-- ══════════════════════════
         MASTER DATA: DAMPAK KLINIS
         ══════════════════════════ -->
    <div id="masterDataDynamic" class="page active">
    <div class="admin-layout">
      <aside class="sidebar" id="sb-masterDataDynamic"></aside>
      <div class="main-area">
        <div class="topbar">
          <div class="topbar-title">Master Data <span id="mdd-title" style="color:var(--muted);font-weight:600"></span>
          </div>
          <div class="topbar-right">
            <div class="theme-toggle-wrap"><span id="theme-ico-admin">🌙</span><button class="theme-toggle" onclick="toggleTheme()"></button></div>
            <span style="font-size:12px;color:var(--muted)" id="topbar-date"></span>
            <div class="topbar-avatar">A</div>
          </div>
        </div>
        <div class="content" id="mdd-content"></div>
      </div>
    </div>
  </div>
  
  <div id="md-add-modal" class="modal-overlay" style="display:none">
    <div class="modal-box" style="max-width:500px">
      <div class="modal-head">
        <div>
          <h3 id="mda-title">Tambah Data</h3>
        </div><button class="modal-close" onclick="closeMdAddModal()">✕</button>
      </div>
      <div style="padding:18px;display:flex;flex-direction:column;gap:14px" id="mda-form"></div>
      <div class="modal-foot" style="justify-content:flex-end;gap:8px"><button class="btn btn-ghost"
          onclick="closeMdAddModal()">Batal</button><button class="btn-approve" style="flex:none;padding:10px 20px"
          onclick="saveMdAddModal()"><i class="ph ph-floppy-disk"></i> Simpan</button></div>
    </div>
  </div>
  
  <div id="g-topbar">
      <div class="mt-logo">
        <div class="mt-logo-icon"><i class="ph ph-hospital"></i></div>
        <div>
          <div class="mt-name">SIDEKAP</div>
          <div class="mt-sub" id="g-page-title"></div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <div class="mt-av">A</div>
        <button class="hamburger-btn" id="g-hamburger" onclick="toggleMobileDrawer()">
          <span class="hb-bar"></span><span class="hb-bar"></span><span class="hb-bar"></span>
        </button>
      </div>
    </div>
    <div id="mobile-overlay" onclick="toggleMobileDrawer()"></div>
    <div id="mobile-drawer">
      <div class="mdr-head"><div class="sb-icon"><i class="ph ph-hospital"></i></div><div>
        <div class="mdr-title">SIDEKAP</div>
        <div class="mdr-subtitle">Admin Panel</div>
      </div></div>
      <div class="mdr-nav" id="mdr-nav-content"></div>
      <div class="mdr-foot"><div class="sb-user"><div class="sb-avatar">A</div><div style="flex:1;min-width:0">
          <div class="sb-uname">Administrator</div>
          <div class="sb-urole">Super Admin</div>
        </div>
        <button onclick="doLogout()" title="Keluar" style="width:28px;height:28px;border-radius:7px;background:var(--border2);border:none;cursor:pointer;font-size:14px;flex-shrink:0;color:var(--text);display:flex;align-items:center;justify-content:center;transition:all .2s"
          onmouseover="this.style.background='var(--danger)';this.style.color='#fff'"
          onmouseout="this.style.background='var(--border2)';this.style.color='var(--text)'">
          <i class="ph ph-sign-out"></i>
        </button>
      </div></div>
    </div>

    <div id="toast" class="toast"></div>
    <h:outputScript library="js" name="Script.js"/>
    <script>//<![CDATA[
      function filterDampakKlinis() {
        const q = document.getElementById('dk-search').value.toLowerCase();
        const rows = document.querySelectorAll('#dk-rows tr');
        rows.forEach(r => r.style.display = r.innerText.toLowerCase().includes(q) ? '' : 'none');
        document.getElementById('dk-reset-btn').style.display = q ? 'inline-flex' : 'none';
      }
      function resetDKFilter() {
        document.getElementById('dk-search').value = '';
        filterDampakKlinis();
      }
      function openTambahModal() {
        document.getElementById('dk-modal-title').innerHTML = '<i class="ph ph-plus-circle" style="margin-right:6px"></i> Tambah Dampak Klinis';
        document.getElementById('dk-f-kode').value = '';
        document.getElementById('dk-f-nama').value = '';
        document.getElementById('dk-f-deskripsi').value = '';
        document.getElementById('dk-modal').style.display = 'flex';
      }
      function closeDKModal() { document.getElementById('dk-modal').style.display = 'none'; }
      function simpanDK() {
        const kode = document.getElementById('dk-f-kode').value.trim();
        const nama = document.getElementById('dk-f-nama').value.trim();
        if (!kode || !nama) { alert('Kode dan nama wajib diisi!'); return; }
        closeDKModal();
        if (typeof showToast === 'function') showToast('Data dampak klinis berhasil disimpan');
      }
      function editRow(btn) {
        const row = btn.closest('tr');
        const cells = row.querySelectorAll('td');
        document.getElementById('dk-modal-title').innerHTML = '<i class="ph ph-pencil-simple" style="margin-right:6px"></i> Edit Dampak Klinis';
        document.getElementById('dk-f-kode').value = cells[1].innerText.trim();
        document.getElementById('dk-f-nama').value = cells[2].innerText.trim();
        document.getElementById('dk-f-deskripsi').value = cells[3].innerText.trim();
        document.getElementById('dk-modal').style.display = 'flex';
      }
      function hapusRow(btn) {
        if (confirm('Yakin ingin menghapus data ini?')) {
          btn.closest('tr').remove();
          if (typeof showToast === 'function') showToast('Data berhasil dihapus');
        }
      }
    //]]>
    document.addEventListener('DOMContentLoaded', () => {
      if (typeof showMasterData === 'function') {
         let o = showPage; showPage = function(){};
         showMasterData('Dampak Klinis');
         showPage = o;
      }
    });
  </script>

  </ui:define>

</ui:composition>
